<!DOCTYPE html>
<html>
    <head>
        <title>{PAGETITLE}</title>
    </head>
    <body>
        <div id="topbar" style="height:25px; width:100%; position: fixed; left:0; top:0; background-color: white;">{TOPBAR}</div>
        <div id="leftbar" style="height:calc(100vh-25px); width:150px; position:fixed; left:0; top:25px;">{SIDEBAR}</div>
        <div id="rightbar" style="height:calc(100vh-25px); width:150px; position:fixed; right:0; top:25px;">{RIGHTBAR}</div>
        <div id="restofbody" style="height:calc(100vh-25px); width:calc(100vw-300px)">{PAGEBODY}</div>
        <script src="/postiframetest.js"></script>
    </body>
</html>
